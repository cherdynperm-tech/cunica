name: PowerShell Quality

on:
  push:
    paths:
      - "scripts/**"
      - ".github/workflows/powershell-quality.yml"
      - "unica-contract.json"
  pull_request:
    paths:
      - "scripts/**"
      - ".github/workflows/powershell-quality.yml"
      - "unica-contract.json"

jobs:
  powershell-quality:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PowerShell quality checks
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\test-powershell-quality.ps1
