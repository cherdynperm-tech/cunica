name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release asset
        shell: bash
        run: cp "scripts/install-cunica.ps1" "install-cunica.ps1"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: install-cunica.ps1
          generate_release_notes: true
